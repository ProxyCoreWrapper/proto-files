syntax = "proto3";

package backend;

// Network events responses configuration
service NetworkEvents {
  rpc GetConfig(GetNetworkEventsConfigRequest) returns (GetNetworkEventsConfigResponse);
  rpc EditConfig(EditNetworkEventsConfigRequest)
      returns (EditNetworkEventsConfigResponse);
}

message GetNetworkEventsConfigRequest {}
message GetNetworkEventsConfigResponse { string config = 1; }

message EditNetworkEventsConfigRequest { string config = 1; }
message EditNetworkEventsConfigResponse {}

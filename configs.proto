syntax = "proto3";

package backend;

// Configs management
service Configs {
  // List configs
  // Error codes: Internal
  rpc ListConfigs(ListConfigsRequest) returns (stream Config);

  // Get the config content
  // Error codes: Internal, NotFound
  rpc GetConfig(GetConfigRequest)
  returns (GetConfigResponse);

  // Edit the config content. If the config doesn't exist, creates the config
  // Error code: Internal, InvalidArgument (Core tag not found), InvalidArgument (Config id is empty)
  rpc EditConfig(EditConfigRequest) returns (EditConfigResponse);

  // Delete the config
  // Error codes: Internal, NotFound
  rpc DeleteConfig(DeleteConfigRequest)
  returns (DeleteConfigResponse);
}

message ListConfigsRequest {}

message Config {
  enum State {
    DOWN    = 0;
    RUNNING = 1;
  }

  string config_id = 1;
  string core_tag  = 2;
  State  state     = 3;
}

message GetConfigRequest {
  string config_id = 1;
}

message GetConfigResponse {
  string config = 1;
}

message EditConfigRequest {
  string config_id = 1;
  string config    = 2;
  string core_tag  = 3;
}

message EditConfigResponse {}

message DeleteConfigRequest {
  string config_id = 1;
}

message DeleteConfigResponse {}
